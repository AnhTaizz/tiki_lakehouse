services:
  spark-notebook:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: tiki_spark_crawler
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./src:/home/jovyan/work/src
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./docker/shared/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
      - ./docker/shared/core-site.xml:/usr/local/spark/conf/core-site.xml
      - ivy2_cache:/root/.ivy2
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      JUPYTER_TOKEN: ""          # empty = no token required (local dev only)
      PYTHONPATH: /home/jovyan/work/src:/usr/local/spark/python:/usr/local/spark/python/lib/py4j-0.10.9.7-src.zip
    user: root
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_started
      reporting-postgres:
        condition: service_healthy
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  postgres:
    image: postgres:13
    container_name: postgres_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: ${HIVE_DB_NAME}
      POSTGRES_USER: ${HIVE_DB_USER}
      POSTGRES_PASSWORD: ${HIVE_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIVE_DB_USER} -d ${HIVE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    build:
      context: ./docker/hive
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      IS_RESUME: "true"
      SERVICE_NAME: "metastore"
      DB_DRIVER: "postgres"
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres_db:5432/${HIVE_DB_NAME}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_DB_USER}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_DB_PASSWORD}
    volumes:
      - ./docker/shared/core-site.xml:/opt/hive/conf/core-site.xml
    command: >
      bash -c "
      /opt/hive/bin/schematool -dbType postgres -initSchema || true &&
      /opt/hive/bin/hive --service metastore
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 15s
      timeout: 10s
      retries: 5

  airflow-postgres:
    image: postgres:13
    container_name: airflow_db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-password123} --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
      airflow pools set tiki_api_pool 3 'Limit Tiki API rate to avoid overloading'
      "
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8081"
      AIRFLOW__SMTP__SMTP_HOST: "smtp.gmail.com"
      AIRFLOW__SMTP__SMTP_STARTTLS: "True"
      AIRFLOW__SMTP__SMTP_SSL: "False"
      AIRFLOW__SMTP__SMTP_USER: "${AIRFLOW_SMTP_USER}"
      AIRFLOW__SMTP__SMTP_PASSWORD: "${AIRFLOW_SMTP_PASSWORD}"
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_MAIL_FROM: "${AIRFLOW_SMTP_USER}"
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: webserver
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_scheduler
    user: root
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8081"
      AIRFLOW__SMTP__SMTP_HOST: "smtp.gmail.com"
      AIRFLOW__SMTP__SMTP_STARTTLS: "True"
      AIRFLOW__SMTP__SMTP_SSL: "False"
      AIRFLOW__SMTP__SMTP_USER: "${AIRFLOW_SMTP_USER}"
      AIRFLOW__SMTP__SMTP_PASSWORD: "${AIRFLOW_SMTP_PASSWORD}"
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_MAIL_FROM: "${AIRFLOW_SMTP_USER}"
      PYTHONPATH: /opt/airflow/src
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow scheduler
      "
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Reporting Postgres — Gold layer data for Superset dashboards
  # ---------------------------------------------------------------------------
  reporting-postgres:
    image: postgres:13
    container_name: reporting_db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: ${REPORTING_DB_NAME:-reporting}
      POSTGRES_USER: ${REPORTING_DB_USER:-reporting}
      POSTGRES_PASSWORD: ${REPORTING_DB_PASSWORD:-reporting123}
    volumes:
      - reporting_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REPORTING_DB_USER:-reporting} -d ${REPORTING_DB_NAME:-reporting}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Superset internal Postgres — store Superset metadata (dashboards, charts)
  # ---------------------------------------------------------------------------
  superset-postgres:
    image: postgres:13
    container_name: superset_db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset123}
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Superset Init — runs once: upgrade DB, create admin user, init roles
  # ---------------------------------------------------------------------------
  superset-init:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    image: tiki_lakehouse-superset:latest
    container_name: superset_init
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-tiki_superset_secret_2026}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset123}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-password123}
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    # Fix: fab create-admin must be on one line — YAML block scalar splitting lines causes bash errors
    command: >
      bash -c "
      superset db upgrade &&
      superset fab create-admin --username ${SUPERSET_ADMIN_USER:-admin} --firstname Admin --lastname User --email admin@example.com --password $${SUPERSET_ADMIN_PASSWORD:-password123} || true &&
      superset init
      "
    depends_on:
      superset-postgres:
        condition: service_healthy
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Superset — Business Intelligence Dashboard
  # Access: http://localhost:8088  |  Login: admin / password123
  # Data Connection: Host=reporting-postgres, Port=5432, DB=reporting
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    image: tiki_lakehouse-superset:latest
    container_name: tiki_superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-tiki_superset_secret_2026}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset123}
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: superset run -h 0.0.0.0 -p 8088 --with-threads
    depends_on:
      superset-init:
        condition: service_completed_successfully
      reporting-postgres:
        condition: service_healthy
    networks:
      - lakehouse


  # ---------------------------------------------------------------------------
  # Kafka Stack — Message broker for data ingestion pipeline
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: tiki_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: tiki_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT://kafka:9092  — used internally within Docker network
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kafka UI — Web UI to browse topics, messages, consumer groups
  # Access: http://localhost:8090
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tiki_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tiki-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - lakehouse

volumes:
  minio_data:
  postgres_data:
  airflow_db_data:
  ivy2_cache:
  reporting_db_data:
  superset_db_data:

networks:
  lakehouse:
    driver: bridge
