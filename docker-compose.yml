version: '3.8'

services:
  spark-notebook:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: tiki_spark_crawler
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./workspace:/home/jovyan/work
      # Mount Spark config (Iceberg + S3A + Hive catalog)
      - ./spark-conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
      # Mount core-site.xml để Hadoop biết kết nối MinIO (dùng chung với Hive)
      - ./hive-conf/core-site.xml:/usr/local/spark/conf/core-site.xml
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    user: root
    depends_on:
      - hive-metastore
      - minio
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  postgres:
    image: postgres:13
    container_name: postgres_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: "metastore"
      DB_DRIVER: "postgres"
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres_db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive_pass
    volumes:
      # JARs để Hive Metastore nói chuyện với MinIO
      - ./hive-lib/hadoop-aws-3.1.1.jar:/opt/hive/lib/hadoop-aws-3.1.1.jar
      - ./hive-lib/aws-java-sdk-bundle-1.11.271.jar:/opt/hive/lib/aws-java-sdk-bundle-1.11.271.jar
      # core-site.xml chứa cấu hình S3A cho MinIO
      - ./hive-conf/core-site.xml:/opt/hive/conf/core-site.xml
    depends_on:
      - postgres
    networks:
      - lakehouse

volumes:
  minio_data:
  postgres_data:

networks:
  lakehouse:
    driver: bridge
