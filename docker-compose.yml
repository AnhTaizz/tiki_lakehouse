services:
  spark-notebook:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: tiki_spark_crawler
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./src:/home/jovyan/work/src
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./config/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
      - ./config/core-site.xml:/usr/local/spark/conf/core-site.xml
      - ivy2_cache:/root/.ivy2
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      PYTHONPATH: /home/jovyan/work/src:/usr/local/spark/python:/usr/local/spark/python/lib/py4j-0.10.9.7-src.zip
    user: root
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  postgres:
    image: postgres:13
    container_name: postgres_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: ${HIVE_DB_NAME}
      POSTGRES_USER: ${HIVE_DB_USER}
      POSTGRES_PASSWORD: ${HIVE_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIVE_DB_USER} -d ${HIVE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    build:
      context: ./hive-custom
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      IS_RESUME: "true"
      SERVICE_NAME: "metastore"
      DB_DRIVER: "postgres"
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres_db:5432/${HIVE_DB_NAME}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_DB_USER}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_DB_PASSWORD}
    volumes:
      - ./config/core-site.xml:/opt/hive/conf/core-site.xml
    command: >
      bash -c "
      /opt/hive/bin/schematool -dbType postgres -initSchema || true &&
      /opt/hive/bin/hive --service metastore
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 15s
      timeout: 10s
      retries: 5

  airflow-postgres:
    image: postgres:13
    container_name: airflow_db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: airflow-custom/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-password123} --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow-custom/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: webserver
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow-custom/Dockerfile
    image: tiki_lakehouse-airflow:2.8.1
    container_name: airflow_scheduler
    user: root
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow scheduler
      "
    networks:
      - lakehouse

volumes:
  minio_data:
  postgres_data:
  airflow_db_data:
  ivy2_cache:

networks:
  lakehouse:
    driver: bridge
