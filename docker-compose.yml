version: '3.8'

services:
  spark-notebook:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: tiki_spark_crawler
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      # Áp dụng cấu trúc thư mục phân tách mã nguồn, dữ liệu mẫu và notebook nháp
      - ./src:/home/jovyan/work/src
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      # Quy hoạch hệ thống cấu hình tập trung vào thư mục config
      - ./config/spark/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
      - ./config/hive/core-site.xml:/usr/local/spark/conf/core-site.xml
      # Lưu trữ đệm để Spark tránh tải lại các gói thư viện .jar qua mạng khi khởi động lại
      - ivy2_cache:/root/.ivy2
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    user: root
    depends_on:
      hive-metastore:
        condition: service_healthy # Spark chỉ bật khi Hive Metastore đã mở port 9083 thành công
      minio:
        condition: service_started
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse

  postgres:
    image: postgres:13
    container_name: postgres_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: ${HIVE_DB_NAME}
      POSTGRES_USER: ${HIVE_DB_USER}
      POSTGRES_PASSWORD: ${HIVE_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse
    # Kiểm tra trạng thái sẵn sàng phản hồi kết nối của PostgreSQL cơ sở dữ liệu metastore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIVE_DB_USER} -d ${HIVE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    build:
      context: ./hive-custom # Xây dựng từ Dockerfile để tự động hóa khâu nạp gói JAR đồng bộ
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      IS_RESUME: "true"
      SERVICE_NAME: "metastore"
      DB_DRIVER: "postgres"
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres_db:5432/${HIVE_DB_NAME}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_DB_USER}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_DB_PASSWORD}
    volumes:
      - ./config/hive/core-site.xml:/opt/hive/conf/core-site.xml
    # Khởi tạo tự động cấu trúc bảng metadata hệ thống (initSchema) rồi mới kích hoạt metastore
    command: >
      bash -c "
      /opt/hive/bin/schematool -dbType postgres -initSchema || true &&
      /opt/hive/bin/hive --service metastore
      "
    depends_on:
      postgres:
        condition: service_healthy # Chỉ chạy khi cơ sở dữ liệu PostgreSQL đã phản hồi khoẻ mạnh
    networks:
      - lakehouse
    # Giám sát trạng thái cổng dịch vụ 9083 của Metastore để phát tín hiệu cho Spark biết
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 15s
      timeout: 10s
      retries: 5

  airflow-postgres:
    image: postgres:13
    container_name: airflow_db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: airflow_init
    depends_on:
      - airflow-postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password password123 --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    networks:
      - lakehouse

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow_webserver
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    volumes:
      # Đồng bộ hóa cấu trúc liên kết các luồng lập lịch và phân vùng mã nguồn xử lý
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    command: webserver
    networks:
      - lakehouse

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow_scheduler
    user: root
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      apt-get update && apt-get install -y docker.io &&
      airflow scheduler
      "
    networks:
      - lakehouse

volumes:
  minio_data:
  postgres_data:
  airflow_db_data:
  ivy2_cache: # Phân vùng lưu trữ bộ nhớ đệm thư viện toàn cục

networks:
  lakehouse:
    driver: bridge