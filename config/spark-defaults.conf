# Iceberg SQL extensions
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg catalog backed by Hive Metastore and MinIO/S3A warehouse
spark.sql.catalog.local_catalog                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local_catalog.type                    hive
spark.sql.catalog.local_catalog.uri                     thrift://hive-metastore:9083
spark.sql.catalog.local_catalog.warehouse               s3a://tiki-warehouse/
spark.sql.defaultCatalog                                local_catalog

# S3A / MinIO settings. Credentials are defined once in config/core-site.xml.
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                            http://minio:9000
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.connection.ssl.enabled              false
spark.hadoop.fs.s3a.aws.credentials.provider            org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Runtime packages for Spark 3.5.0 / Hadoop 3.3.4
# postgresql JDBC driver thêm vào để Gold job ghi được vào Reporting Postgres
spark.jars.packages                                     org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.3

# Local development sizing
spark.driver.memory                                     1g
spark.executor.memory                                   1g
