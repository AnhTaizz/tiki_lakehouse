# ================================================================
# ICEBERG SQL EXTENSIONS
# Bật cú pháp SQL mở rộng của Iceberg (MERGE INTO, TIME TRAVEL...)
# ================================================================
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ================================================================
# ICEBERG CATALOG: local_catalog
# Khai báo cho Spark biết "local_catalog" dùng HiveCatalog
# -> Hive Metastore giữ danh mục bảng
# -> MinIO (s3a) là nơi lưu data thật
# ================================================================
spark.sql.catalog.local_catalog                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local_catalog.type                    hive
spark.sql.catalog.local_catalog.uri                     thrift://hive-metastore:9083
spark.sql.catalog.local_catalog.warehouse               s3a://tiki-warehouse/

# ================================================================
# S3A / MinIO CONFIGURATION
# Dạy Hadoop cách nói chuyện với MinIO (giả lập S3)
# ================================================================
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                            http://minio:9000
spark.hadoop.fs.s3a.access.key                          admin
spark.hadoop.fs.s3a.secret.key                          password123
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.connection.ssl.enabled              false
spark.hadoop.fs.s3a.aws.credentials.provider            org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# ================================================================
# AUTO-DOWNLOAD JARS (lần đầu chạy cần internet ~2 phút)
# - iceberg-spark-runtime: engine đọc/ghi Iceberg
# - hadoop-aws: driver S3A để kết nối MinIO
# - aws-java-sdk-bundle: thư viện AWS SDK cho hadoop-aws
# Lưu ý: hadoop-aws 3.3.4 phải khớp với Spark 3.5.0 (Hadoop 3.3.4)
# ================================================================
spark.jars.packages                                     org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# ================================================================
# PERFORMANCE / MISC
# ================================================================
spark.sql.defaultCatalog                                local_catalog
spark.driver.memory                                     1g
spark.executor.memory                                   1g
